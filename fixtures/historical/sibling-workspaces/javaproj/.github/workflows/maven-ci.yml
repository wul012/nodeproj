name: Java Maven CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  maven:
    name: Maven compile and non-Docker regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: advanced-order-platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile
        run: mvn -B -q -DskipTests compile

      - name: Non-Docker regression tests
        run: >
          mvn -B -q
          "-Dtest=!PostgresMigrationIntegrationTests,!RabbitMqNotificationConsumerIntegrationTests,!RabbitMqNotificationFailureIntegrationTests,!RabbitMqOutboxPublisherIntegrationTests"
          "-DargLine=-XX:TieredStopAtLevel=1 -Xmx512m"
          test

      - name: Package
        run: mvn -B -q -DskipTests package
