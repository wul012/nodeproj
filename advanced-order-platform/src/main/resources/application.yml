spring:
  application:
    name: advanced-order-platform
  datasource:
    url: jdbc:h2:mem:order-platform;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.hibernate.SQL: warn

order:
  expiration:
    enabled: true
    unpaid-timeout: PT15M
    scan-delay-ms: 60000

outbox:
  publisher:
    enabled: true
    scan-delay-ms: 60000
